<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="dark">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JP — Hardsurface Artist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark;
    --bg:      #06060a;
    --panel:   #09090f;
    --red:     oklch(0.55 0.24 25);
    --red-dim: oklch(0.55 0.24 25 / 0.15);
    --cyan:    oklch(0.84 0.18 195);
    --cyan-dim:oklch(0.84 0.18 195 / 0.12);
    --text:    oklch(0.93 0.01 240);
    --sub:     oklch(0.45 0.03 240);
    --muted:   oklch(0.28 0.03 240);
    --sep:     oklch(0.14 0.03 240);
    --green:   oklch(0.72 0.18 150);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); }

  /* ── LAYOUT ── */
  .stage { display: flex; width: 100vw; height: 100vh; }

  /* ── LEFT PANEL ── */
  .panel {
    width: clamp(340px, 38vw, 500px);
    flex-shrink: 0;
    background: var(--panel);
    display: flex; flex-direction: column;
    justify-content: space-between;
    padding: clamp(28px, 4vw, 56px);
    position: relative; z-index: 2;
    border-right: 1px solid var(--sep);
    opacity: 0; transform: translateX(-32px);
    animation: panelIn 0.9s cubic-bezier(0.22,1,0.36,1) 0.15s forwards;
  }

  /* accent line on right edge */
  .panel::after {
    content: '';
    position: absolute; top: 8%; bottom: 8%; right: -1px; width: 1px;
    background: linear-gradient(180deg, transparent, var(--red), var(--cyan), transparent);
    opacity: 0.6;
    animation: linePulse 4s ease-in-out infinite;
  }

  /* ── TOP MARK ── */
  .mark {
    display: flex; align-items: center; gap: 10px;
    opacity: 0; animation: fadeUp 0.5s ease 0.7s forwards;
  }
  .mark-icon {
    width: 7px; height: 7px;
    border: 1px solid var(--red);
    transform: rotate(45deg);
    animation: markPulse 3s ease-in-out infinite;
  }
  .mark-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px; letter-spacing: 5px; text-transform: uppercase;
    color: var(--red);
  }

  /* ── NAME ── */
  .name-block { opacity: 0; animation: fadeUp 0.7s ease 0.9s forwards; }
  .name {
    font-family: 'Orbitron', sans-serif; font-weight: 900;
    font-size: clamp(80px, 11vw, 140px);
    color: var(--text); line-height: 0.85; letter-spacing: -3px;
    text-shadow: 0 0 80px oklch(0.55 0.24 25 / 0.08);
  }

  .rule {
    width: 0; height: 2px;
    background: linear-gradient(90deg, var(--red), var(--cyan));
    margin: 22px 0 16px;
    animation: ruleExpand 0.7s cubic-bezier(0.22,1,0.36,1) 1.1s forwards;
  }

  .role {
    font-family: 'Space Mono', monospace;
    font-size: clamp(9px, 0.9vw, 11px);
    letter-spacing: 6px; text-transform: uppercase;
    color: var(--sub);
    opacity: 0; animation: fadeUp 0.5s ease 1.2s forwards;
  }

  /* ── BUTTONS ── */
  .buttons {
    display: flex; flex-direction: column; gap: 12px; margin-top: 36px;
    opacity: 0; animation: fadeUp 0.6s ease 1.35s forwards;
  }

  .btn {
    display: flex; align-items: center; justify-content: space-between;
    padding: 15px 22px;
    font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
    text-decoration: none; cursor: pointer;
    position: relative; overflow: hidden;
    transition: letter-spacing 0.3s ease;
  }
  .btn::before {
    content: ''; position: absolute; inset: 0;
    opacity: 0; transition: opacity 0.3s ease;
  }
  .btn:hover { letter-spacing: 5px; }
  .btn:hover::before { opacity: 1; }
  .btn span { position: relative; z-index: 1; }

  .btn-primary {
    border: 1px solid var(--red); color: var(--red);
  }
  .btn-primary::before { background: var(--red-dim); }
  .btn-primary:hover {
    box-shadow: 0 0 24px oklch(0.55 0.24 25 / 0.2), inset 0 0 24px oklch(0.55 0.24 25 / 0.04);
  }

  .btn-ghost {
    border: 1px solid var(--sep); color: var(--sub);
  }
  .btn-ghost::before { background: var(--cyan-dim); }
  .btn-ghost:hover {
    border-color: var(--cyan); color: var(--cyan);
    box-shadow: 0 0 20px oklch(0.84 0.18 195 / 0.12);
  }

  .btn-arrow { transition: transform 0.3s ease; }
  .btn:hover .btn-arrow { transform: translateX(5px); }

  /* ── BOTTOM ── */
  .bottom {
    display: flex; align-items: center; justify-content: space-between;
    opacity: 0; animation: fadeUp 0.5s ease 1.5s forwards;
  }
  .linkedin {
    display: flex; align-items: center; gap: 8px;
    text-decoration: none; color: var(--muted);
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 2px; text-transform: uppercase; transition: color 0.2s;
  }
  .linkedin:hover { color: var(--cyan); }
  .linkedin svg { width: 13px; height: 13px; fill: currentColor; }

  .status { display: flex; align-items: center; gap: 7px; }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px oklch(0.72 0.18 150 / 0.9);
    animation: blink 2.5s ease-in-out infinite;
  }
  .status-text {
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
  }

  /* ── ARTWORK PANEL ── */
  .artwork {
    flex: 1; position: relative; background: #000; overflow: hidden;
    opacity: 0; animation: artworkIn 1.4s ease 0.3s forwards;
  }
  .artwork img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; object-position: center;
    animation: imgShake 5s ease-in-out infinite;
  }

  /* Gradient vignette */
  .artwork-vignette {
    position: absolute; inset: 0; pointer-events: none; z-index: 2;
    background:
      linear-gradient(to right, #000 0%, transparent 20%),
      radial-gradient(ellipse 80% 80% at 60% 50%, transparent 50%, #000 100%);
  }

  /* HUD corners */
  .hud { position: absolute; width: 18px; height: 18px; z-index: 4; }
  .hud-tl { top: 20px; left: 20px; border-top: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
  .hud-tr { top: 20px; right: 20px; border-top: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }
  .hud-bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
  .hud-br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }

  /* HUD data tag */
  .hud-tag {
    position: absolute; bottom: 28px; right: 28px; z-index: 5;
    text-align: right;
    opacity: 0; animation: fadeUp 0.5s ease 2s forwards;
  }
  .hud-tag span {
    display: block; font-family: 'Space Mono', monospace;
    font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
    color: oklch(0.84 0.18 195 / 0.4); line-height: 2;
  }
  .hud-tag span:first-child { color: oklch(0.84 0.18 195 / 0.8); }

  /* Glitch layers */
  .glitch-r, .glitch-b {
    position: absolute; inset: 0;
    background-image: url('uploads/revolver_Main Camera5_003-e90bf461.jpg');
    background-size: cover; background-position: center;
    opacity: 0; mix-blend-mode: screen; z-index: 3;
  }
  .glitch-r { filter: saturate(0) brightness(2) sepia(1) hue-rotate(-30deg); animation: glitchR 5s ease-in-out infinite; }
  .glitch-b { filter: saturate(0) brightness(2) sepia(1) hue-rotate(200deg); animation: glitchB 5s ease-in-out infinite; }
  .glitch-bar {
    position: absolute; left: 0; right: 0; height: 2px; z-index: 4;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
    opacity: 0; animation: glitchBar 5s ease-in-out infinite;
  }
  .glitch-scanlines {
    position: absolute; inset: 0; z-index: 3; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
  }

  /* ── THEME SWITCHER ── */
  .theme-switcher {
    position: fixed; top: 20px; right: 24px; z-index: 100;
    display: flex; gap: 4px;
  }
  .theme-btn {
    width: 30px; height: 30px;
    border: 1px solid var(--sep); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 12px; transition: all 0.2s; color: var(--muted);
  }
  .theme-btn:hover, .theme-btn.active { border-color: var(--red); color: var(--text); }

  /* ── LIGHT THEME ── */
  body.light {
    --bg: #f8f8f5; --panel: #f0f0ec; --text: #111111;
    --sub: #666; --muted: #aaa; --sep: #ddd;
    background: var(--bg);
  }
  body.light .artwork { background: #f0f0ec; }
  body.light .artwork-vignette { background: linear-gradient(to right, #f0f0ec 0%, transparent 25%), radial-gradient(ellipse 80% 80% at 60% 50%, transparent 50%, #f0f0ec 100%); }

  /* ── KEYFRAMES ── */
  @keyframes panelIn    { to { opacity:1; transform:translateX(0); } }
  @keyframes artworkIn  { from{opacity:0} to{opacity:1} }
  @keyframes fadeUp     { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes ruleExpand { to { width: 48px; } }
  @keyframes linePulse  { 0%,100%{opacity:0.3} 50%{opacity:0.8} }
  @keyframes markPulse  { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 10px var(--red)} }
  @keyframes blink      { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes imgShake   { 0%,91%{transform:translate(0,0)} 92%{transform:translate(-1px,1px)} 94%{transform:translate(1px,-1px)} 96%{transform:translate(-1px,0)} 100%{transform:translate(0,0)} }
  @keyframes glitchBar  { 0%{opacity:0;top:20%} 5%{opacity:1} 10%{opacity:0;top:60%} 15%{opacity:1;top:35%} 20%{opacity:0} 100%{opacity:0} }
  @keyframes glitchR    { 0%,92%{opacity:0;transform:translate(0,0)} 93%{opacity:0.16;transform:translate(-5px,1px)} 95%{opacity:0;transform:translate(3px,-1px)} 97%{opacity:0.1;transform:translate(-2px,0)} 100%{opacity:0} }
  @keyframes glitchB    { 0%,92%{opacity:0;transform:translate(0,0)} 93%{opacity:0.13;transform:translate(5px,-1px)} 95%{opacity:0;transform:translate(-3px,2px)} 97%{opacity:0.08;transform:translate(2px,0)} 100%{opacity:0} }
</style>
</head>
<body>

<div class="theme-switcher">
  <button class="theme-btn" id="btn-light" title="Light">☀</button>
  <button class="theme-btn active" id="btn-dark" title="Dark">☾</button>
</div>

<div class="stage">

  <!-- LEFT PANEL -->
  <div class="panel">
    <div class="mark">
      <div class="mark-icon"></div>
      <span class="mark-label">Portfolio</span>
    </div>

    <div class="name-block">
      <div class="name">JP</div>
      <div class="rule"></div>
      <div class="role">Hardsurface Artist</div>
      <div class="buttons">
        <a href="Gallery Page.html" class="btn btn-primary">
          <span>View Gallery</span>
          <span class="btn-arrow">→</span>
        </a>
        <a href="About Page.html" class="btn btn-ghost">
          <span>About Me</span>
          <span class="btn-arrow">→</span>
        </a>
      </div>
    </div>

    <div class="bottom">
      <a href="https://www.linkedin.com/in/janpoeppler/" target="_blank" class="linkedin">
        <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        <span>LinkedIn</span>
      </a>
      <div class="status">
        <div class="status-dot"></div>
        <span class="status-text">Available</span>
      </div>
    </div>
  </div>

  <!-- ARTWORK -->
  <div class="artwork">
    <img src="uploads/revolver_Main Camera5_003-e90bf461.jpg" alt="Revolver hero render" />
    <div class="artwork-vignette"></div>
    <div class="glitch-r"></div>
    <div class="glitch-b"></div>
    <div class="glitch-bar"></div>
    <div class="glitch-scanlines"></div>
    <div class="hud hud-tl"></div>
    <div class="hud hud-tr"></div>
    <div class="hud hud-bl"></div>
    <div class="hud hud-br"></div>
    <div class="hud-tag">
      <span>Featured Work</span>
      <span>Revolver — Weapon Art</span>
      <span>Marmoset / PBR</span>
    </div>
  </div>

</div>

<script>
  const btnLight = document.getElementById('btn-light');
  const btnDark  = document.getElementById('btn-dark');
  const saved = localStorage.getItem('jp_theme') || 'dark';
  if (saved === 'light') {
    document.body.classList.add('light');
    btnLight.classList.add('active'); btnDark.classList.remove('active');
  }
  btnLight.addEventListener('click', () => {
    document.body.classList.add('light');
    btnLight.classList.add('active'); btnDark.classList.remove('active');
    localStorage.setItem('jp_theme', 'light');
  });
  btnDark.addEventListener('click', () => {
    document.body.classList.remove('light');
    btnDark.classList.add('active'); btnLight.classList.remove('active');
    localStorage.setItem('jp_theme', 'dark');
  });
</script>
</body>
</html>
